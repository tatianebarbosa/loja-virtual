<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja Virtual</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Loja Virtual">
        <span class="brand-mark">LV</span>
        <span>Loja Virtual</span>
      </a>

      <div class="cart-summary" aria-live="polite">
        <span id="cart-count">0 itens</span>
        <strong id="cart-total">R$ 0,00</strong>
      </div>
    </header>

    <main>
      <section class="intro">
        <div>
          <p class="eyebrow">Ofertas selecionadas</p>
          <h1>Produtos para montar seu setup do jeito certo.</h1>
          <div class="benefits" aria-label="Benefícios da loja">
            <span>Frete grátis acima de R$ 500</span>
            <span>Compra segura</span>
            <span>Retirada em até 2 horas</span>
          </div>
        </div>
        <div class="search-wrap">
          <label for="search">Buscar produto</label>
          <input id="search" type="search" placeholder="Notebook, smartphone, fone..." />
        </div>
      </section>

      <section class="shop-layout" aria-label="Produtos e carrinho">
        <div>
          <div class="section-heading">
            <div>
              <h2>Produtos</h2>
              <span id="product-count">Carregando...</span>
            </div>
            <label class="sort-control" for="sort">
              <span>Ordenar</span>
              <select id="sort">
                <option value="featured">Destaques</option>
                <option value="price-asc">Menor preço</option>
                <option value="price-desc">Maior preço</option>
                <option value="rating">Melhor avaliação</option>
              </select>
            </label>
          </div>
          <div id="category-filters" class="category-filters" aria-label="Categorias"></div>
          <div id="products" class="products-grid"></div>
        </div>

        <aside class="cart-panel" aria-label="Carrinho">
          <div class="section-heading">
            <h2>Carrinho</h2>
            <button id="clear-cart" type="button">Limpar</button>
          </div>
          <div id="cart-items" class="cart-items">
            <p class="empty-state">Seu carrinho está vazio.</p>
          </div>
          <div class="shipping-progress">
            <span id="shipping-message">Adicione produtos para calcular o frete grátis.</span>
            <div class="progress-track" aria-hidden="true">
              <span id="shipping-bar"></span>
            </div>
          </div>
          <div class="checkout-row">
            <span>Total</span>
            <strong id="checkout-total">R$ 0,00</strong>
          </div>
          <button id="checkout-button" class="checkout-button" type="button">Finalizar compra</button>
          <p id="checkout-note" class="checkout-note" role="status"></p>
        </aside>
      </section>
    </main>

    <div id="product-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" class="modal-close" type="button" aria-label="Fechar">x</button>
        <div class="modal-grid">
          <img id="modal-image" class="modal-image" src="" alt="" />
          <div class="modal-content">
            <span id="modal-category" class="modal-category"></span>
            <h2 id="modal-title"></h2>
            <p id="modal-description"></p>
            <div class="modal-facts">
              <span id="modal-rating"></span>
              <span id="modal-stock"></span>
            </div>
            <div>
              <span id="modal-old-price" class="modal-old-price"></span>
              <strong id="modal-price" class="modal-price"></strong>
              <span id="modal-installment" class="modal-installment"></span>
            </div>
            <button id="modal-add" class="modal-add-button" type="button">Adicionar ao carrinho</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
